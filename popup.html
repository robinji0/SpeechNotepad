<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Speech Notepad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <div class="header">
        <div class="title-group">
            <h2 data-i18n="title">Voice Notepad</h2>
            <button id="sponsorBtn" class="sponsor-btn">☕ <span data-i18n="sponsor">Sponsor</span></button>
        </div>
        <div class="ui-lang-group" title="Change Interface Language / 切换界面语言">
            <span>🌐</span>
            <select id="uiLangSelect" class="ui-lang-select">
                <option value="en">EN</option>
                <option value="zh">中</option>
            </select>
        </div>
    </div>

    <div class="control-bar">
        <div class="speech-lang-group">
            <span class="label-text" data-i18n="dictationLang">🎙️ Dictation Lang:</span>
            <select id="speechLangSelect" class="speech-lang-select" title="Choose the language you are going to speak">
                <option value="zh-CN">🇨🇳 中文 (Chinese)</option>
                <option value="en-US">🇺🇸 English (US)</option>
                <option value="ja-JP">🇯🇵 日本語 (Japanese)</option>
                <option value="ko-KR">🇰🇷 한국어 (Korean)</option>
                <option value="fr-FR">🇫🇷 Français (French)</option>
                <option value="de-DE">🇩🇪 Deutsch (German)</option>
                <option value="es-ES">🇪🇸 Español (Spanish)</option>
            </select>
        </div>
        <button id="micBtn" class="btn" data-i18n="startBtn">Start Recording</button>
    </div>

    <div id="status" class="status" data-i18n="statusDefault">Click the button above to start speaking...</div>

    <textarea id="textArea"></textarea>

    <div id="interimText" class="interim-text"></div>

    <div class="action-bar">
        <button id="copyBtn" class="action-btn copy-btn" data-i18n="copyBtn">Copy All</button>
        <button id="clearBtn" class="action-btn clear-btn" data-i18n="clearBtn">Clear Content</button>
    </div>

    <div class="history-section">
        <div class="history-header">
            <h3 data-i18n="recentTitle">Recent Conversions</h3>
            <button id="clearHistoryBtn" class="text-btn" data-i18n="clearHistoryBtn">Clear All</button>
        </div>
        <ul id="historyList" class="history-list"></ul>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
